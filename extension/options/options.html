<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>PDF Chat Settings</title>
  <style>
    body { font-family: system-ui,sans-serif; max-width: 420px; margin: 40px auto; padding: 0 20px; background: #1e1e2e; color: #cdd6f4; }
    h1 { color: #cba6f7; font-size: 20px; margin-bottom: 24px; }
    h2 { color: #a6adc8; font-size: 14px; text-transform: uppercase; letter-spacing: .05em; margin-bottom: 12px; }
    .section { margin-bottom: 28px; padding-bottom: 24px; border-bottom: 1px solid #313244; }
    .field { margin-bottom: 12px; }
    label { display: block; font-size: 12px; color: #a6adc8; margin-bottom: 5px; }
    input, select { width: 100%; padding: 8px 12px; background: #313244; border: 1px solid #45475a; border-radius: 8px; color: #cdd6f4; font-size: 14px; box-sizing: border-box; }
    input:focus, select:focus { outline: none; border-color: #cba6f7; }
    button { width: 100%; padding: 10px; border: none; border-radius: 8px; font-weight: 700; cursor: pointer; margin-top: 6px; font-size: 14px; }
    .btn-primary { background: #cba6f7; color: #1e1e2e; }
    .btn-primary:hover { background: #b4befe; }
    .btn-secondary { background: #313244; color: #cdd6f4; border: 1px solid #45475a; }
    .btn-secondary:hover { background: #45475a; }
    .btn-danger { background: #f38ba8; color: #1e1e2e; }
    .btn-danger:hover { background: #eba0ac; }
    #status { margin-top: 10px; font-size: 13px; min-height: 20px; }
    .ok { color: #a6e3a1; }
    .err { color: #f38ba8; }
    .tab-row { display: flex; gap: 8px; margin-bottom: 16px; }
    .tab { flex: 1; padding: 8px; border: 1px solid #45475a; border-radius: 8px; background: #313244; color: #a6adc8; cursor: pointer; font-size: 13px; font-weight: 600; }
    .tab.active { background: #cba6f7; color: #1e1e2e; border-color: #cba6f7; }
  </style>
</head>
<body>
  <h1>PDF Chat</h1>

  <div class="section">
    <h2>Account</h2>
    <div id="signed-in-view" style="display:none">
      <div id="signed-in-email" style="font-size:14px; margin-bottom:12px; color:#a6e3a1;"></div>
      <button class="btn-danger" id="logout-btn">Sign Out</button>
    </div>
    <div id="auth-view">
      <div class="tab-row">
        <button class="tab active" id="tab-signin">Sign In</button>
        <button class="tab" id="tab-signup">Create Account</button>
      </div>
      <div class="field"><label>Email</label>
        <input id="email" type="email" placeholder="you@example.com" autocomplete="email"></div>
      <div class="field"><label>Password</label>
        <input id="password" type="password" autocomplete="current-password"></div>
      <button class="btn-primary" id="auth-btn">Sign In</button>
    </div>
    <div id="status"></div>
  </div>

  <div class="section">
    <h2>Model</h2>
    <div class="field"><label>LLM Model</label>
      <select id="model">
        <option value="gpt-4o">GPT-4o (OpenAI)</option>
        <option value="gemini/gemini-2.5-flash">Gemini 2.5 Flash (Google)</option>
        <option value="claude-sonnet-4-6">Claude Sonnet (Anthropic)</option>
      </select>
    </div>
    <button class="btn-primary" id="save-btn">Save</button>
  </div>

  <script src="../lib/supabase.js"></script>
  <script src="options.js"></script>
</body>
</html>
