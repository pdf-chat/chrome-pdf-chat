name: Rotate Gemini API Key

on:
  schedule:
    - cron: '0 0 1 * *'  # 00:00 UTC on the 1st of every month
  workflow_dispatch:       # allow manual trigger from GitHub UI

jobs:
  rotate:
    runs-on: ubuntu-latest
    environment: dependable-nurturing / production
    permissions:
      contents: read

    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS_JSON }}

      - name: Set up gcloud CLI
        uses: google-github-actions/setup-gcloud@v2

      - name: Create new Gemini API key
        id: new_key
        run: |
          KEY_NAME=$(gcloud services api-keys create \
            --project="${{ secrets.GCP_PROJECT_ID }}" \
            --display-name="pdf-chat-gemini-$(date +%Y-%m)" \
            --api-target=service=generativelanguage.googleapis.com \
            --format="value(response.name)")

          echo "Key resource: $KEY_NAME"

          KEY_STRING=$(gcloud services api-keys get-key-string "$KEY_NAME" \
            --format="value(keyString)")

          # Mask the key so it never appears in any subsequent log line
          echo "::add-mask::$KEY_STRING"

          echo "key_string=$KEY_STRING" >> $GITHUB_OUTPUT
          echo "key_name=$KEY_NAME" >> $GITHUB_OUTPUT

      - name: Push new key version to Secret Manager
        run: |
          # Create the secret if this is the first rotation
          gcloud secrets describe gemini-api-key \
            --project="${{ secrets.GCP_PROJECT_ID }}" > /dev/null 2>&1 || \
          gcloud secrets create gemini-api-key \
            --project="${{ secrets.GCP_PROJECT_ID }}" \
            --replication-policy=automatic

          echo -n "${{ steps.new_key.outputs.key_string }}" | \
            gcloud secrets versions add gemini-api-key \
              --project="${{ secrets.GCP_PROJECT_ID }}" \
              --data-file=-
          echo "New secret version created."

      - name: Disable all previous secret versions
        run: |
          # List all versions except the latest, then disable them
          VERSIONS=$(gcloud secrets versions list gemini-api-key \
            --project="${{ secrets.GCP_PROJECT_ID }}" \
            --filter="state=ENABLED" \
            --format="value(name)" \
            --sort-by="~createTime" | tail -n +2)

          if [ -z "$VERSIONS" ]; then
            echo "No old versions to disable."
          else
            echo "$VERSIONS" | while read -r version; do
              echo "Disabling $version"
              gcloud secrets versions disable "$version" \
                --project="${{ secrets.GCP_PROJECT_ID }}" --quiet
            done
          fi

      - name: Delete old pdf-chat Gemini API keys
        run: |
          NEW_KEY_NAME="${{ steps.new_key.outputs.key_name }}"

          gcloud services api-keys list \
            --project="${{ secrets.GCP_PROJECT_ID }}" \
            --filter="displayName:pdf-chat-gemini-*" \
            --format="value(name)" | while read -r key; do
            if [ "$key" != "$NEW_KEY_NAME" ]; then
              echo "Deleting old key: $key"
              gcloud services api-keys delete "$key" \
                --project="${{ secrets.GCP_PROJECT_ID }}" --quiet
            fi
          done

      - name: Summary
        run: |
          echo "### Rotation complete" >> $GITHUB_STEP_SUMMARY
          echo "- New key stored in Secret Manager as version \`latest\`" >> $GITHUB_STEP_SUMMARY
          echo "- Old Secret Manager versions disabled" >> $GITHUB_STEP_SUMMARY
          echo "- Old GCP API keys deleted" >> $GITHUB_STEP_SUMMARY
          echo "- The Railway backend will pick up the new key within 1 hour (cache TTL)" >> $GITHUB_STEP_SUMMARY
